# =============================================================================
# Prometheus Configuration for Dakera
# =============================================================================
# Used by:
#   - monitoring/docker-compose.yml  (standalone monitoring stack)
#   - docker/docker-compose.ha.yml   (--profile monitoring)

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Dakera single-node (docker-compose.yml default setup)
  - job_name: 'dakera'
    static_configs:
      - targets: ['dakera:3000']
        labels:
          deployment: 'single-node'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # Dakera HA cluster nodes (docker-compose.ha.yml)
  # Uncomment when using HA profile:
  # - job_name: 'dakera-ha'
  #   static_configs:
  #     - targets: ['dakera-1:3000', 'dakera-2:3000', 'dakera-3:3000']
  #       labels:
  #         deployment: 'ha'
  #   metrics_path: '/metrics'
  #   scrape_interval: 10s
  #   scrape_timeout: 5s

  # MinIO metrics
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: '/minio/v2/metrics/cluster'
    scrape_interval: 30s

  # Traefik metrics (HA profile only)
  # - job_name: 'traefik'
  #   static_configs:
  #     - targets: ['traefik:8080']
  #   metrics_path: '/metrics'
