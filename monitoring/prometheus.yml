# =============================================================================
# Prometheus Configuration for Dakera
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Dakera HA cluster nodes
  - job_name: 'dakera'
    static_configs:
      - targets: ['dakera-1:3000', 'dakera-2:3000', 'dakera-3:3000']
        labels:
          cluster: 'ha'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s

  # MinIO metrics
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: '/minio/v2/metrics/cluster'

  # Redis metrics (via redis-exporter, if added)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']

  # Traefik metrics
  - job_name: 'traefik'
    static_configs:
      - targets: ['traefik:8080']
    metrics_path: '/metrics'
