name: Hetzner Provision Staging Server
# Trigger: workflow_dispatch (manual). See inputs below.

# Reusable template for spinning up ephemeral staging environments.
# Run manually; outputs the new server's IP and ID for follow-up steps.
# IMPORTANT: Remember to run the "Deprovision" job when done to avoid costs.

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: "Server name (e.g. staging-pr-123)"
        required: true
      server_type:
        description: "Hetzner server type (cpx32 = 4vCPU/8GB, cpx42 = 8vCPU/16GB)"
        required: false
        default: "cpx32"
      image:
        description: "OS image (ubuntu-24.04, ubuntu-22.04, debian-12)"
        required: false
        default: "ubuntu-24.04"
      location:
        description: "Datacenter location (nbg1, fsn1, hel1)"
        required: false
        default: "nbg1"
      replace_existing:
        description: "Delete existing server with same name before creating"
        required: false
        default: "false"

concurrency:
  group: hetzner-provision-${{ inputs.server_name }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision ${{ inputs.server_name }}
    runs-on: ubuntu-latest
    outputs:
      server_id: ${{ steps.create.outputs.server_id }}
      server_ip: ${{ steps.create.outputs.server_ip }}
    steps:
      - name: Handle existing server
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
        run: |
          EXISTING=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?per_page=50" \
            | jq -r --arg name "${{ inputs.server_name }}" \
              '.servers[] | select(.name == $name) | .id')
          if [ -n "$EXISTING" ]; then
            if [ "${{ inputs.replace_existing }}" = "true" ]; then
              echo "Deleting existing server '${{ inputs.server_name }}' (id: $EXISTING)..."
              curl -sf -X DELETE \
                -H "Authorization: Bearer $HETZNER_TOKEN" \
                "https://api.hetzner.cloud/v1/servers/$EXISTING"
              echo "Deleted. Waiting 10s for cleanup..."
              sleep 10
            else
              echo "ERROR: Server '${{ inputs.server_name }}' already exists (id: $EXISTING). Set replace_existing=true to delete first."
              exit 1
            fi
          fi
          echo "Proceeding with server creation."

      - name: Ensure SSH key registered
        id: ssh_key
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
        run: |
          KEY_NAME="ops-dakera-ai"
          PUB_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIO+69Mv++aOAjMyHWmmtYXp6O31t1jwQXFt9OHzqIoN2 ops@dakera.ai"
          EXISTING_KEY=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/ssh_keys" \
            | jq -r --arg name "$KEY_NAME" '.ssh_keys[] | select(.name == $name) | .id')
          if [ -n "$EXISTING_KEY" ]; then
            echo "SSH key '$KEY_NAME' already registered (id: $EXISTING_KEY)"
            echo "key_id=$EXISTING_KEY" >> "$GITHUB_OUTPUT"
          else
            RESP=$(curl -s -o /tmp/ssh_resp.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $HETZNER_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.hetzner.cloud/v1/ssh_keys" \
              -d "{\"name\": \"$KEY_NAME\", \"public_key\": \"$PUB_KEY\"}")
            if [ "$RESP" -ge 400 ]; then
              echo "ERROR registering SSH key: $(cat /tmp/ssh_resp.json)"
              exit 1
            fi
            KEY_ID=$(cat /tmp/ssh_resp.json | jq -r '.ssh_key.id')
            echo "Registered SSH key: id=$KEY_ID"
            echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Create server
        id: create
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
          SSH_KEY_ID: ${{ steps.ssh_key.outputs.key_id }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/hetzner_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers" \
            -d "{
              \"name\": \"${{ inputs.server_name }}\",
              \"server_type\": \"${{ inputs.server_type }}\",
              \"image\": \"${{ inputs.image }}\",
              \"location\": \"${{ inputs.location }}\",
              \"ssh_keys\": [$SSH_KEY_ID],
              \"labels\": {
                \"source\": \"github-actions\",
                \"env\": \"staging\",
                \"workflow_run\": \"${{ github.run_id }}\"
              },
              \"start_after_create\": true
            }")
          RESPONSE=$(cat /tmp/hetzner_resp.json)
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Hetzner API returned $HTTP_CODE: $RESPONSE"
            exit 1
          fi
          SERVER_ID=$(echo "$RESPONSE" | jq -r '.server.id')
          if [ -z "$SERVER_ID" ] || [ "$SERVER_ID" = "null" ]; then
            echo "ERROR: Server creation failed: $RESPONSE"
            exit 1
          fi
          SERVER_IP=$(echo "$RESPONSE" | jq -r '.server.public_net.ipv4.ip')
          echo "server_id=$SERVER_ID" >> "$GITHUB_OUTPUT"
          echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"
          echo "Created server: id=$SERVER_ID ip=$SERVER_IP"

      - name: Wait for server to be running
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
          SERVER_ID: ${{ steps.create.outputs.server_id }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -sf \
              -H "Authorization: Bearer $HETZNER_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/$SERVER_ID" \
              | jq -r '.server.status')
            echo "Attempt $i/30 — server status: $STATUS"
            if [ "$STATUS" = "running" ]; then
              echo "Server is running."
              exit 0
            fi
            sleep 10
          done
          echo "TIMEOUT: server did not reach running state within 5 minutes."
          exit 1

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="🖥️ [Platform] Server provisioned

Name: ${{ inputs.server_name }}
IP: ${{ steps.create.outputs.server_ip }}
Type: ${{ inputs.server_type }} / ${{ inputs.image }} @ ${{ inputs.location }}
ID: ${{ steps.create.outputs.server_id }}
SSH: ssh root@${{ steps.create.outputs.server_ip }}"
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"$MSG\"}" > /dev/null

  deprovision:
    name: Deprovision ${{ inputs.server_name }}
    runs-on: ubuntu-latest
    needs: provision
    if: false
    steps:
      - name: Delete server
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
          SERVER_ID: ${{ needs.provision.outputs.server_id }}
        run: |
          curl -sf -X DELETE \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID"
          echo "Server $SERVER_ID deleted."
