name: Deploy Playground Proxy

# Auto-deploys the sandbox proxy to the playground server whenever proxy source
# changes land on main. Fills the gap left by playground-proxy-ci.yml (tests
# only) — build-context containers don't auto-update on PR merge without this.

on:
  push:
    branches: [main]
    paths:
      - 'docker/playground/proxy/**'
      - 'docker/docker-compose.playground.yml'
      - 'docker/nginx-playground.conf'
      - '.github/workflows/playground-proxy-deploy.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "manual redeploy"

env:
  PLAYGROUND_IP: ${{ secrets.PLAYGROUND_IP }}
  PROXY_SRC: docker/playground/proxy
  PROXY_DEST: /opt/playground/playground/proxy
  COMPOSE_FILE: /opt/playground/docker-compose.yml

jobs:
  deploy-proxy:
    name: Deploy sandbox proxy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$PLAYGROUND_IP" >> ~/.ssh/known_hosts 2>/dev/null || true

      # KEY ROTATION: if this step fails with "Permission denied (publickey)":
      #   1. ssh-keygen -t ed25519 -C 'deploy-playground' -f /tmp/pg_deploy
      #   2. ssh root@<PLAYGROUND_IP> 'cat >> ~/.ssh/authorized_keys' < /tmp/pg_deploy.pub
      #   3. gh secret set DEPLOY_SSH_KEY --repo dakera-ai/dakera-deploy < /tmp/pg_deploy
      #   4. rm /tmp/pg_deploy /tmp/pg_deploy.pub
      - name: Verify SSH connectivity
        run: |
          if ! ssh -i ~/.ssh/deploy_key \
               -o StrictHostKeyChecking=no \
               -o ConnectTimeout=5 \
               -o BatchMode=yes \
               root@${{ env.PLAYGROUND_IP }} echo ok 2>&1; then
            echo "❌ SSH check failed — DEPLOY_SSH_KEY does not match playground server authorized_keys."
            echo "Follow the KEY ROTATION procedure in the comments above this step."
            exit 1
          fi
          echo "✅ SSH connectivity verified"

      - name: Copy proxy source to server
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.PROXY_SRC }}/*.js \
            ${{ env.PROXY_SRC }}/Dockerfile \
            ${{ env.PROXY_SRC }}/package.json \
            root@${{ env.PLAYGROUND_IP }}:${{ env.PROXY_DEST }}/

      - name: Deploy Nginx config (burst + rate limits)
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker/nginx-playground.conf \
            root@${{ env.PLAYGROUND_IP }}:/tmp/nginx-playground.conf.new

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${{ env.PLAYGROUND_IP }}" bash << 'REMOTE'
          set -e
          CURRENT=/etc/nginx/sites-available/playground

          # Detect current SSL cert paths from the running config
          CERT=$(grep -m1 'ssl_certificate ' "$CURRENT" 2>/dev/null | awk '{print $2}' | tr -d ';')
          KEY=$(grep -m1 'ssl_certificate_key ' "$CURRENT" 2>/dev/null | awk '{print $2}' | tr -d ';')

          if [ -z "$CERT" ] || [ -z "$KEY" ]; then
            CERT="/etc/nginx/ssl/playground.crt"
            KEY="/etc/nginx/ssl/playground.key"
          fi

          echo "SSL cert: $CERT"
          echo "SSL key:  $KEY"

          sed "s|SSL_CERT_PLACEHOLDER|${CERT}|g; s|SSL_KEY_PLACEHOLDER|${KEY}|g" \
            /tmp/nginx-playground.conf.new > /tmp/nginx-playground-rendered.conf

          cp "$CURRENT" "${CURRENT}.bak"
          cp /tmp/nginx-playground-rendered.conf "$CURRENT"

          if nginx -t 2>&1; then
            nginx -s reload
            BURST=$(grep -o 'burst=[0-9]*' "$CURRENT" | head -1)
            echo "✅ Nginx config deployed — $BURST active"
          else
            echo "❌ Nginx config test failed — rolling back"
            cp "${CURRENT}.bak" "$CURRENT"
            nginx -s reload
            exit 1
          fi

          rm -f /tmp/nginx-playground.conf.new /tmp/nginx-playground-rendered.conf "${CURRENT}.bak"
          REMOTE

      - name: Rebuild and restart proxy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "root@${{ env.PLAYGROUND_IP }}" bash << 'REMOTE'
          set -e
          cd /opt/playground
          echo "Building proxy image..."
          docker compose -f docker-compose.yml build --no-cache sandbox-proxy
          echo "Restarting sandbox-proxy..."
          docker compose -f docker-compose.yml up -d --no-deps sandbox-proxy
          echo "Waiting for health..."
          sleep 8
          HEALTH=$(curl -sf http://localhost:3100/health 2>/dev/null) || { echo "Health check failed"; exit 1; }
          echo "Proxy healthy: $HEALTH"
          REMOTE

      - name: Notify Telegram on success
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="✅ [Platform] Playground proxy + Nginx deployed — $(git log -1 --format='%s')"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&text=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$MSG")" > /dev/null

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="❌ [Platform] Playground proxy deploy FAILED — $(git log -1 --format='%s'). Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}&text=$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1]))" "$MSG")" > /dev/null
