name: Emergency Reboot ARM Runner Server

on:
  workflow_dispatch:
    inputs:
      server_ip:
        description: 'Server IP to reboot (or rebuild if runner server). Defaults to ARM_RUNNER_IP secret if omitted.'
        required: false

jobs:
  server-action:
    name: Server action via Hetzner API
    runs-on: ubuntu-latest
    steps:
      - name: Find SSH key in Hetzner
        id: ssh_key
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
        run: |
          PUB_KEY_DATA="AAAAC3NzaC1lZDI1NTE5AAAAIO+69Mv++aOAjMyHWmmtYXp6O31t1jwQXFt9OHzqIoN2"
          ALL_KEYS=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/ssh_keys")
          KEY_ID=$(echo "$ALL_KEYS" | jq -r --arg pk "$PUB_KEY_DATA" \
            '.ssh_keys[] | select(.public_key | contains($pk)) | .id')
          KEY_NAME=$(echo "$ALL_KEYS" | jq -r --arg pk "$PUB_KEY_DATA" \
            '.ssh_keys[] | select(.public_key | contains($pk)) | .name')
          if [ -n "$KEY_ID" ]; then
            echo "Found SSH key '$KEY_NAME' (id: $KEY_ID)"
            echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"
          else
            echo "SSH key not found. Registering..."
            HTTP_CODE=$(curl -s -o /tmp/ssh_resp.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $HETZNER_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.hetzner.cloud/v1/ssh_keys" \
              -d "{\"name\": \"ops-dakera-ai\", \"public_key\": \"ssh-ed25519 ${PUB_KEY_DATA} ops@dakera.ai\"}")
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo "ERROR registering SSH key ($HTTP_CODE): $(cat /tmp/ssh_resp.json)"
              exit 1
            fi
            KEY_ID=$(cat /tmp/ssh_resp.json | jq -r '.ssh_key.id')
            echo "Registered SSH key: id=$KEY_ID"
            echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"
          fi

      - name: Find server
        id: find
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
          TARGET_IP: ${{ github.event.inputs.server_ip || secrets.ARM_RUNNER_IP }}
        run: |
          set -e
          echo "Finding server with IP: $TARGET_IP"
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?per_page=50")

          SERVER_ID=$(echo "$RESPONSE" | jq -r \
            --arg ip "$TARGET_IP" \
            '.servers[] | select(.public_net.ipv4.ip == $ip) | .id')
          SERVER_NAME=$(echo "$RESPONSE" | jq -r \
            --arg ip "$TARGET_IP" \
            '.servers[] | select(.public_net.ipv4.ip == $ip) | .name')
          SERVER_STATUS=$(echo "$RESPONSE" | jq -r \
            --arg ip "$TARGET_IP" \
            '.servers[] | select(.public_net.ipv4.ip == $ip) | .status')

          echo "Server: $SERVER_NAME (ID: $SERVER_ID) Status: $SERVER_STATUS"
          echo "server_id=$SERVER_ID" >> "$GITHUB_OUTPUT"
          echo "server_name=$SERVER_NAME" >> "$GITHUB_OUTPUT"

          if [ -z "$SERVER_ID" ] || [ "$SERVER_ID" = "null" ]; then
            echo "ERROR: No server found with IP $TARGET_IP"
            echo "All servers:"
            echo "$RESPONSE" | jq -r '.servers[] | "\(.id) \(.name) \(.public_net.ipv4.ip) \(.status)"'
            exit 1
          fi

      - name: Delete and recreate runner server with SSH key
        id: recreate
        if: contains(steps.find.outputs.server_name, 'runner')
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
          SERVER_ID: ${{ steps.find.outputs.server_id }}
          SSH_KEY_ID: ${{ steps.ssh_key.outputs.key_id }}
          SERVER_NAME: ${{ steps.find.outputs.server_name }}
        run: |
          echo "Runner server detected — deleting and recreating with SSH key..."
          # Get server details for recreation
          SERVER_INFO=$(curl -sf \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID")
          SERVER_TYPE=$(echo "$SERVER_INFO" | jq -r '.server.server_type.name')
          LOCATION=$(echo "$SERVER_INFO" | jq -r '.server.datacenter.location.name')
          echo "Current: type=$SERVER_TYPE location=$LOCATION"

          # Delete
          echo "Deleting server $SERVER_ID..."
          curl -sf -X DELETE \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID"
          echo "Deleted. Waiting 10s..."
          sleep 10

          # Recreate with SSH key
          echo "Creating new server with SSH key $SSH_KEY_ID..."
          HTTP_CODE=$(curl -s -o /tmp/create_resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers" \
            -d "{
              \"name\": \"$SERVER_NAME\",
              \"server_type\": \"$SERVER_TYPE\",
              \"image\": \"ubuntu-24.04\",
              \"location\": \"$LOCATION\",
              \"ssh_keys\": [$SSH_KEY_ID],
              \"labels\": {
                \"role\": \"ci-runner\",
                \"arch\": \"x86_64\",
                \"source\": \"github-actions\"
              },
              \"start_after_create\": true
            }")
          echo "Create HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: $(cat /tmp/create_resp.json)"
            exit 1
          fi
          NEW_ID=$(cat /tmp/create_resp.json | jq -r '.server.id')
          NEW_IP=$(cat /tmp/create_resp.json | jq -r '.server.public_net.ipv4.ip')
          echo "New server: id=$NEW_ID ip=$NEW_IP"
          echo "new_ip=$NEW_IP" >> "$GITHUB_OUTPUT"
          echo "new_id=$NEW_ID" >> "$GITHUB_OUTPUT"

          # Wait for running
          for i in $(seq 1 20); do
            STATUS=$(curl -sf \
              -H "Authorization: Bearer $HETZNER_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/$NEW_ID" \
              | jq -r '.server.status')
            echo "Attempt $i/20 — status: $STATUS"
            if [ "$STATUS" = "running" ]; then
              echo "Server running at $NEW_IP"
              exit 0
            fi
            sleep 10
          done
          echo "WARNING: Server may still be starting."

      - name: Reboot server (non-runner servers)
        if: "!contains(steps.find.outputs.server_name, 'runner')"
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
          SERVER_ID: ${{ steps.find.outputs.server_id }}
        run: |
          echo "Triggering soft reboot on server $SERVER_ID..."
          REBOOT_RESP=$(curl -sf -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers/${SERVER_ID}/actions/reboot")
          ACTION_ID=$(echo "$REBOOT_RESP" | jq -r '.action.id')
          ACTION_STATUS=$(echo "$REBOOT_RESP" | jq -r '.action.status')
          echo "Reboot action ID: $ACTION_ID  Status: $ACTION_STATUS"
          echo "Server reboot initiated."

      - name: Notify Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SERVER_NAME: ${{ steps.find.outputs.server_name }}
          TARGET_IP: ${{ github.event.inputs.server_ip || secrets.ARM_RUNNER_IP }}
        run: |
          NEW_IP="${{ steps.recreate.outputs.new_ip }}"
          if [[ "$SERVER_NAME" == *runner* ]]; then
            MSG="🖥️ [Platform] Runner server recreated with SSH key (fresh Ubuntu 24.04)."$'\n'"New IP: ${NEW_IP:-unknown}"$'\n'"SSH: ssh root@${NEW_IP:-unknown}"$'\n'"Ready for runner setup."
          else
            MSG="⚙️ [Platform] Server $TARGET_IP ($SERVER_NAME) reboot triggered via Hetzner API."
          fi
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"$MSG\"}" > /dev/null 2>&1 || true
