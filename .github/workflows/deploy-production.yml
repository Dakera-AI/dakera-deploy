name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Dakera version tag to deploy (e.g. 0.10.1 or edge)"
        required: true
      build_sha:
        description: "Git SHA baked into the image (for hotfix/edge deploys). Shown by build-image.yml as BUILD_SHA. Health check verifies /health build_sha field instead of version string."
        required: false
        default: ""
      skip_health_check:
        description: "Skip post-deploy health check"
        required: false
        default: "false"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  SERVER_IP: ${{ secrets.SERVER_IP_PROD }}
  DEPLOY_USER: "dakera"
  HEALTH_URL: "http://${{ secrets.SERVER_IP_PROD }}:3300/health"
  REGISTRY: "ghcr.io/dakera-ai/dakera"

jobs:
  deploy:
    name: Deploy v${{ inputs.version }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify Docker image exists
        run: |
          echo "Checking ghcr.io/dakera-ai/dakera:${{ inputs.version }}..."
          for i in $(seq 1 90); do
            if docker manifest inspect ghcr.io/dakera-ai/dakera:${{ inputs.version }} > /dev/null 2>&1; then
              echo "✅ Image exists (attempt $i/10)"
              exit 0
            fi
            echo "⏳ Attempt $i/10: image not yet available, waiting 60s (ARM build lag)..."
            sleep 60
          done
          echo "❌ Image ghcr.io/dakera-ai/dakera:${{ inputs.version }} not found after 10 minutes"
          exit 1

      - name: Checkout deploy config
        uses: actions/checkout@v7

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync docker-compose.yml to server
        run: |
          echo "Syncing docker/docker-compose.yml to server..."
          # Resolve compose dir via container label; fall back to known install path
          COMPOSE_DIR=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ env.DEPLOY_USER }}@${{ env.SERVER_IP }} \
            "CONTAINER=\$(docker ps --filter 'name=dakera' --format '{{.Names}}' | head -1); \
             [ -n \"\$CONTAINER\" ] && docker inspect \"\$CONTAINER\" --format '{{ index .Config.Labels \"com.docker.compose.project.working_dir\" }}' 2>/dev/null || true")
          COMPOSE_DIR="${COMPOSE_DIR:-/home/dakera/ops/repos/dakera-deploy/docker}"
          echo "Compose dir: $COMPOSE_DIR"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            docker/docker-compose.yml \
            "${{ env.DEPLOY_USER }}@${{ env.SERVER_IP }}:$COMPOSE_DIR/docker-compose.yml"
          echo "✅ docker-compose.yml synced"

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ env.DEPLOY_USER }}@${{ env.SERVER_IP }} << 'DEPLOY_SCRIPT'
          set -euo pipefail
          echo "=== Deploying Dakera v${{ inputs.version }} ==="

          # Pull new image
          docker pull ghcr.io/dakera-ai/dakera:${{ inputs.version }}

          # Known compose dir — used as fallback when label is absent
          KNOWN_COMPOSE_DIR="/home/dakera/ops/repos/dakera-deploy/docker"

          # Find the running dakera container (exact name match to avoid matching dakera-minio, etc.)
          # Use || true inside the subshell so grep exit-1 (no match) doesn't kill the script under set -o pipefail
          CONTAINER=$(docker ps --format "{{.Names}}" | grep -E '^dakera$' || true)
          if [ -z "$CONTAINER" ]; then
            echo "WARNING: No running dakera container found — starting fresh via compose"
            COMPOSE_DIR="$KNOWN_COMPOSE_DIR"
            if [ -f "$COMPOSE_DIR/docker-compose.yml" ]; then
              cd "$COMPOSE_DIR"
              DAKERA_IMAGE=ghcr.io/dakera-ai/dakera:${{ inputs.version }} docker compose up -d --force-recreate minio minio-setup dakera
            else
              echo "ERROR: docker-compose.yml not found at $COMPOSE_DIR"
              exit 1
            fi
          else
            # Use docker-compose in the service directory (from label, or fall back to known path)
            COMPOSE_DIR=$(docker inspect "$CONTAINER" --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' 2>/dev/null || echo "")
            COMPOSE_DIR="${COMPOSE_DIR:-$KNOWN_COMPOSE_DIR}"
            if [ -d "$COMPOSE_DIR" ] && [ -f "$COMPOSE_DIR/docker-compose.yml" ]; then
              cd "$COMPOSE_DIR"
              # Remove stale containers before recreate — catches both the exact name (dakera)
              # and any compose project-hash alias (<hash>_dakera) that can cause naming conflicts
              docker ps -a --format "{{.Names}}" | grep -E '^(dakera|[a-f0-9]+_dakera)$' | xargs -r docker rm -f 2>/dev/null || true
              # Force-recreate minio so new resource limits (cpus/memory) take effect
              DAKERA_IMAGE=ghcr.io/dakera-ai/dakera:${{ inputs.version }} docker compose up -d --force-recreate minio minio-setup dakera
            else
              echo "ERROR: docker-compose.yml not found at $COMPOSE_DIR"
              exit 1
            fi
          fi

          # Authoritative deployment check: confirm the running container is on the image
          # we just pulled (digest match). The /health version field reports the binary's
          # Cargo semver, which cannot distinguish a moving tag (edge/latest) from the
          # version it already served — so digest equality is the only reliable signal.
          EXPECTED_IMAGE_ID=$(docker inspect "ghcr.io/dakera-ai/dakera:${{ inputs.version }}" --format '{{.Id}}')
          RUNNING_CONTAINER=$(docker ps --filter "name=dakera" --format "{{.Names}}" | grep -vE 'minio' | head -1)
          RUNNING_IMAGE_ID=$(docker inspect "$RUNNING_CONTAINER" --format '{{.Image}}')
          echo "Expected image id: $EXPECTED_IMAGE_ID"
          echo "Running  image id: $RUNNING_IMAGE_ID (container: $RUNNING_CONTAINER)"
          if [ "$EXPECTED_IMAGE_ID" != "$RUNNING_IMAGE_ID" ]; then
            echo "❌ Running container is NOT on the pulled image — deployment did not take effect"
            exit 1
          fi
          echo "✅ Container verified on pulled image digest"

          echo "=== Deploy complete ==="
          DEPLOY_SCRIPT

      - name: Wait for service startup
        if: inputs.skip_health_check != 'true'
        run: sleep 15

      - name: Health check
        if: inputs.skip_health_check != 'true'
        run: |
          BUILD_SHA="${{ inputs.build_sha }}"
          # Semver check only applies when version is a real semver (not moving tags like edge/latest).
          case "${{ inputs.version }}" in
            [0-9]*.[0-9]*.[0-9]*) REQUIRE_VERSION_MATCH=1 ;;
            *) REQUIRE_VERSION_MATCH=0 ;;
          esac
          for i in $(seq 1 12); do
            RESPONSE=$(curl -sf --max-time 10 "${{ env.HEALTH_URL }}" 2>/dev/null || echo '{"error":"unreachable"}')
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"')
            VERSION=$(echo "$RESPONSE" | jq -r '.version // "unknown"')
            RESP_SHA=$(echo "$RESPONSE" | jq -r '.build_sha // "none"')
            echo "Attempt $i/12 — status=$STATUS version=$VERSION build_sha=$RESP_SHA"
            if [ "$STATUS" = "healthy" ]; then
              if [ -n "$BUILD_SHA" ]; then
                # Hotfix/edge deploy: verify by build SHA, not semantic version.
                # Accept full SHA or 7-char short SHA prefix from either side.
                SHORT="${BUILD_SHA:0:7}"
                if [[ "$RESP_SHA" == "$BUILD_SHA"* ]] || [[ "$RESP_SHA" == "$SHORT"* ]] || [[ "$BUILD_SHA" == "$RESP_SHA"* ]]; then
                  echo "✅ Deployed and healthy: ${{ inputs.version }} (build_sha: $RESP_SHA)"
                  exit 0
                fi
              elif [ "$REQUIRE_VERSION_MATCH" = "0" ] || [ "$VERSION" = "${{ inputs.version }}" ]; then
                echo "✅ Deployed and healthy: v${{ inputs.version }}"
                exit 0
              fi
            fi
            sleep 10
          done
          echo "❌ Health check failed after 2 minutes"
          exit 1

      - name: Send Telegram notification
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          BUILD_SHA="${{ inputs.build_sha }}"
          SHA_SUFFIX=""
          [ -n "$BUILD_SHA" ] && SHA_SUFFIX=" (sha: ${BUILD_SHA:0:7})"
          if [ "${{ job.status }}" = "success" ]; then
            MSG="✅ [Platform] Deployed dakera ${{ inputs.version }}${SHA_SUFFIX} to production\n\nServer: ${{ env.SERVER_IP }}\nHealth: ✅ healthy"
          else
            MSG="❌ [Platform] Deploy dakera ${{ inputs.version }}${SHA_SUFFIX} FAILED\n\nServer: ${{ env.SERVER_IP }}\nCheck: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"${MSG}\"}" > /dev/null
