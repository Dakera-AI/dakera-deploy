name: Hetzner Server Management

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action: delete-recreate, list-servers, resize"
        required: true
        type: choice
        options:
          - delete-recreate
          - list-servers
          - resize
      target_server_name:
        description: "Target server name (for delete-recreate)"
        required: false
        default: "hetzner-runner-x64"
      target_server_ip:
        description: "Target server IP (for resize — e.g. 178.104.227.173)"
        required: false
        default: ""
      server_type:
        description: "Server type for recreation/resize (cpx41=8vCPU/16GB, cpx51=16vCPU/32GB)"
        required: false
        default: "cpx41"

permissions: {}

jobs:
  manage:
    name: "${{ inputs.action }}"
    runs-on: ubuntu-latest
    steps:
      - name: List all servers
        if: inputs.action == 'list-servers'
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
        run: |
          curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?per_page=50" \
            | jq -r '.servers[] | "\(.id)\t\(.name)\t\(.public_net.ipv4.ip)\t\(.server_type.name)\t\(.status)\t\(.datacenter.location.name)"'

      - name: Find SSH key
        if: inputs.action == 'delete-recreate'
        id: ssh_key
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
        run: |
          PUB_KEY_DATA="AAAAC3NzaC1lZDI1NTE5AAAAIO+69Mv++aOAjMyHWmmtYXp6O31t1jwQXFt9OHzqIoN2"
          ALL_KEYS=$(curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/ssh_keys")
          KEY_ID=$(echo "$ALL_KEYS" | jq -r --arg pk "$PUB_KEY_DATA" \
            '.ssh_keys[] | select(.public_key | contains($pk)) | .id')
          echo "SSH key ID: $KEY_ID"
          echo "key_id=$KEY_ID" >> "$GITHUB_OUTPUT"

      - name: Delete and recreate
        if: inputs.action == 'delete-recreate'
        id: recreate
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
          SSH_KEY_ID: ${{ steps.ssh_key.outputs.key_id }}
        run: |
          TARGET="${{ inputs.target_server_name }}"
          SERVERS=$(curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?per_page=50")

          OLD_ID=$(echo "$SERVERS" | jq -r --arg n "$TARGET" '.servers[] | select(.name == $n) | .id')
          LOCATION=$(echo "$SERVERS" | jq -r --arg n "$TARGET" '.servers[] | select(.name == $n) | .datacenter.location.name')

          if [ -n "$OLD_ID" ] && [ "$OLD_ID" != "null" ]; then
            echo "Deleting server $TARGET (id: $OLD_ID)..."
            curl -sf -X DELETE -H "Authorization: Bearer $HETZNER_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/$OLD_ID"
            sleep 10
            echo "Deleted."
          else
            echo "No existing server named $TARGET."
            LOCATION="nbg1"
          fi

          echo "Creating $TARGET (${{ inputs.server_type }}) at ${LOCATION} with SSH key ${SSH_KEY_ID}..."
          HTTP_CODE=$(curl -s -o /tmp/resp.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers" \
            -d "{
              \"name\": \"$TARGET\",
              \"server_type\": \"${{ inputs.server_type }}\",
              \"image\": \"ubuntu-24.04\",
              \"location\": \"${LOCATION}\",
              \"ssh_keys\": [${SSH_KEY_ID}],
              \"labels\": {\"role\":\"ci-runner\",\"arch\":\"x86_64\"},
              \"start_after_create\": true
            }")
          echo "HTTP: $HTTP_CODE"
          cat /tmp/resp.json | jq .
          if [ "$HTTP_CODE" -ge 400 ]; then
            exit 1
          fi
          NEW_IP=$(cat /tmp/resp.json | jq -r '.server.public_net.ipv4.ip')
          NEW_ID=$(cat /tmp/resp.json | jq -r '.server.id')
          echo "new_ip=$NEW_IP" >> "$GITHUB_OUTPUT"
          echo "new_id=$NEW_ID" >> "$GITHUB_OUTPUT"
          echo "Created: id=$NEW_ID ip=$NEW_IP"

          for i in $(seq 1 20); do
            sleep 10
            S=$(curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/$NEW_ID" | jq -r '.server.status')
            echo "[$i] status: $S"
            [ "$S" = "running" ] && break
          done

      - name: Resize server (cold resize — poweroff → change_type → poweron)
        if: inputs.action == 'resize'
        id: resize
        env:
          HETZNER_TOKEN: ${{ secrets.HETZNER }}
        run: |
          TARGET_IP="${{ inputs.target_server_ip }}"
          if [ -z "$TARGET_IP" ]; then
            echo "ERROR: target_server_ip is required for resize action"
            exit 1
          fi
          SERVERS=$(curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers?per_page=50")
          SERVER_ID=$(echo "$SERVERS" | jq -r --arg ip "$TARGET_IP" \
            '.servers[] | select(.public_net.ipv4.ip == $ip) | .id')
          SERVER_NAME=$(echo "$SERVERS" | jq -r --arg ip "$TARGET_IP" \
            '.servers[] | select(.public_net.ipv4.ip == $ip) | .name')
          CURRENT_TYPE=$(echo "$SERVERS" | jq -r --arg ip "$TARGET_IP" \
            '.servers[] | select(.public_net.ipv4.ip == $ip) | .server_type.name')
          if [ -z "$SERVER_ID" ] || [ "$SERVER_ID" = "null" ]; then
            echo "ERROR: No server found with IP $TARGET_IP"
            echo "$SERVERS" | jq -r '.servers[] | "\(.id) \(.name) \(.public_net.ipv4.ip) \(.server_type.name)"'
            exit 1
          fi
          echo "Server: $SERVER_NAME (ID: $SERVER_ID) current type: $CURRENT_TYPE → target: ${{ inputs.server_type }}"
          echo "server_name=$SERVER_NAME" >> "$GITHUB_OUTPUT"

          echo "Powering off $SERVER_NAME..."
          curl -sf -X POST -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/poweroff" > /dev/null
          for i in $(seq 1 24); do
            sleep 10
            STATUS=$(curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/$SERVER_ID" | jq -r '.server.status')
            echo "[$i] status: $STATUS"
            [ "$STATUS" = "off" ] && break
          done

          echo "Changing server type to ${{ inputs.server_type }}..."
          RESIZE_RESP=$(curl -sf -X POST -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/change_type" \
            -d "{\"server_type\": \"${{ inputs.server_type }}\", \"upgrade_disk\": false}")
          ACTION_ID=$(echo "$RESIZE_RESP" | jq -r '.action.id')
          echo "Resize action ID: $ACTION_ID — waiting for completion..."
          for i in $(seq 1 30); do
            sleep 10
            ACT_STATUS=$(curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/$ACTION_ID" \
              | jq -r '.action.status')
            echo "[$i] action status: $ACT_STATUS"
            [ "$ACT_STATUS" = "success" ] && break
            if [ "$ACT_STATUS" = "error" ]; then
              echo "ERROR: resize action failed"
              exit 1
            fi
          done

          echo "Powering on $SERVER_NAME..."
          curl -sf -X POST -H "Authorization: Bearer $HETZNER_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID/actions/poweron" > /dev/null
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
              "https://api.hetzner.cloud/v1/servers/$SERVER_ID" | jq -r '.server.status')
            echo "[$i] status: $STATUS"
            [ "$STATUS" = "running" ] && break
          done
          NEW_TYPE=$(curl -sf -H "Authorization: Bearer $HETZNER_TOKEN" \
            "https://api.hetzner.cloud/v1/servers/$SERVER_ID" | jq -r '.server.server_type.name')
          echo "Resize complete. Server $SERVER_NAME is now running as type: $NEW_TYPE"
          echo "new_type=$NEW_TYPE" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram
        if: inputs.action == 'delete-recreate' || inputs.action == 'resize'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ "${{ inputs.action }}" = "resize" ]; then
            NEW_TYPE="${{ steps.resize.outputs.new_type }}"
            SERVER_NAME="${{ steps.resize.outputs.server_name }}"
            MSG="🖥️ [Platform] Server resized (DAK-6253)"$'\n'"Name: ${SERVER_NAME}"$'\n'"IP: ${{ inputs.target_server_ip }}"$'\n'"New type: ${NEW_TYPE}"$'\n'"Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          else
            NEW_IP="${{ steps.recreate.outputs.new_ip }}"
            MSG="🖥️ [CTO] Runner server recreated"$'\n'"Name: ${{ inputs.target_server_name }}"$'\n'"IP: ${NEW_IP}"$'\n'"Type: ${{ inputs.server_type }}"$'\n'"SSH: ssh root@${NEW_IP}"
          fi
          curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"$MSG\"}" > /dev/null 2>&1 || true
