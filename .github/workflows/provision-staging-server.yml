name: Provision Staging Server

on:
  workflow_dispatch:
    inputs:
      server_name:
        description: "Server name"
        required: true
        default: "staging-dakera-paperclip"
      server_type:
        description: "Hetzner server type (cpx31=4vCPU/8GB AMD, cpx41=8vCPU/16GB AMD)"
        required: false
        default: "cpx31"
      image:
        description: "OS image"
        required: false
        default: "ubuntu-22.04"
      location:
        description: "Datacenter (nbg1=Nuremberg, fsn1=Falkenstein, hel1=Helsinki)"
        required: false
        default: "fsn1"

concurrency:
  group: provision-staging-${{ inputs.server_name }}
  cancel-in-progress: false

jobs:
  provision:
    name: Provision ${{ inputs.server_name }}
    runs-on: ubuntu-latest

    steps:
      - name: Install hcloud CLI
        run: |
          curl -fsSL https://github.com/hetznercloud/cli/releases/latest/download/hcloud-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin hcloud
          hcloud version

      - name: Check if server already exists
        id: check
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER }}
        run: |
          EXISTING=$(hcloud server describe "${{ inputs.server_name }}" --output format="{{ .ID }}" 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            EXISTING_IP=$(hcloud server describe "${{ inputs.server_name }}" --output format="{{ .PublicNet.IPv4.IP }}")
            echo "Server already exists: id=$EXISTING ip=$EXISTING_IP"
            echo "server_exists=true" >> "$GITHUB_OUTPUT"
            echo "server_id=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "server_ip=$EXISTING_IP" >> "$GITHUB_OUTPUT"
          else
            echo "server_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure ops SSH key registered
        id: ssh_key
        if: steps.check.outputs.server_exists != 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER }}
        run: |
          KEY_NAME="ops-dakera-ai"
          PUB_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIO+69Mv++aOAjMyHWmmtYXp6O31t1jwQXFt9OHzqIoN2 ops@dakera.ai"
          # Compute MD5 fingerprint (Hetzner stores MD5, not SHA256)
          FINGERPRINT=$(ssh-keygen -E md5 -lf /dev/stdin <<< "$PUB_KEY" | awk '{print $2}' | sed 's/MD5://')
          echo "Looking for key with fingerprint: $FINGERPRINT"
          EXISTING_ID=$(hcloud ssh-key list -o json | \
            python3 -c "import sys,json; keys=json.load(sys.stdin); \
            match=[k['id'] for k in keys if k['fingerprint']=='$FINGERPRINT']; \
            print(match[0] if match else '')")
          if [ -n "$EXISTING_ID" ]; then
            EXISTING_NAME=$(hcloud ssh-key describe "$EXISTING_ID" --output format="{{ .Name }}")
            echo "SSH key found: id=$EXISTING_ID name=$EXISTING_NAME"
          else
            hcloud ssh-key create --name "$KEY_NAME" --public-key "$PUB_KEY"
            EXISTING_ID=$(hcloud ssh-key describe "$KEY_NAME" --output format="{{ .ID }}")
            echo "SSH key registered: id=$EXISTING_ID name=$KEY_NAME"
          fi
          echo "key_id=$EXISTING_ID" >> "$GITHUB_OUTPUT"

      - name: Debug available server types
        if: steps.check.outputs.server_exists != 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER }}
        run: |
          echo "Available server types in ${{ inputs.location }}:"
          hcloud server-type list -o columns=name,cores,memory,disk 2>&1 | head -30

      - name: Create server
        id: create
        if: steps.check.outputs.server_exists != 'true'
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER }}
        run: |
          KEY_ID="${{ steps.ssh_key.outputs.key_id }}"
          echo "Creating server: ${{ inputs.server_name }} (${{ inputs.server_type }} @ ${{ inputs.location }}) ssh-key-id=$KEY_ID"
          hcloud server create \
            --name "${{ inputs.server_name }}" \
            --type "${{ inputs.server_type }}" \
            --image "${{ inputs.image }}" \
            --location "${{ inputs.location }}" \
            --ssh-key "$KEY_ID" \
            --label "env=staging" \
            --label "purpose=dakera-paperclip-test" \
            --label "dak-issue=DAK-2795"
          SERVER_ID=$(hcloud server describe "${{ inputs.server_name }}" --output format="{{ .ID }}")
          SERVER_IP=$(hcloud server describe "${{ inputs.server_name }}" --output format="{{ .PublicNet.IPv4.IP }}")
          echo "server_id=$SERVER_ID" >> "$GITHUB_OUTPUT"
          echo "server_ip=$SERVER_IP" >> "$GITHUB_OUTPUT"
          echo "Created: id=$SERVER_ID ip=$SERVER_IP"

      - name: Resolve server details
        id: server
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER }}
        run: |
          if [ "${{ steps.check.outputs.server_exists }}" = "true" ]; then
            echo "server_id=${{ steps.check.outputs.server_id }}" >> "$GITHUB_OUTPUT"
            echo "server_ip=${{ steps.check.outputs.server_ip }}" >> "$GITHUB_OUTPUT"
          else
            echo "server_id=${{ steps.create.outputs.server_id }}" >> "$GITHUB_OUTPUT"
            echo "server_ip=${{ steps.create.outputs.server_ip }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for SSH ready
        env:
          HCLOUD_TOKEN: ${{ secrets.HETZNER }}
          SERVER_IP: ${{ steps.server.outputs.server_ip }}
        run: |
          echo "Waiting for SSH on $SERVER_IP..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no -o ConnectTimeout=5 \
              -i /dev/null -o BatchMode=yes \
              root@$SERVER_IP "echo ok" 2>/dev/null; then
              echo "SSH ready"
              exit 0
            fi
            echo "Attempt $i/30..."
            sleep 10
          done
          echo "WARNING: SSH not responding yet — server may need more time"

      - name: Show connection info
        env:
          SERVER_IP: ${{ steps.server.outputs.server_ip }}
          SERVER_ID: ${{ steps.server.outputs.server_id }}
        run: |
          echo ""
          echo "============================================"
          echo "Server ready!"
          echo "  Name: ${{ inputs.server_name }}"
          echo "  ID:   $SERVER_ID"
          echo "  IP:   $SERVER_IP"
          echo "  SSH:  ssh root@$SERVER_IP"
          echo "============================================"
          echo ""
          echo "Next: update hosts.yml and run Ansible bootstrap:"
          echo "  sed -i 's/REPLACE_WITH_SERVER_IP/$SERVER_IP/' ansible/inventories/shopylive-app/hosts.yml"
          echo "  export SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt"
          echo "  make bootstrap CLIENT=shopylive-app"

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SERVER_IP: ${{ steps.server.outputs.server_ip }}
          SERVER_ID: ${{ steps.server.outputs.server_id }}
        run: |
          MSG="⚙️ [Platform] Staging server ready (DAK-2795)%0A%0AName: ${{ inputs.server_name }}%0AType: ${{ inputs.server_type }} / ${{ inputs.image }} @ ${{ inputs.location }}%0AID: $SERVER_ID%0AIP: $SERVER_IP%0ASSH: ssh root@$SERVER_IP%0A%0ANext: Ansible bootstrap running — deploying Dakera + Paperclip for shopylive."
          curl -sf "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${MSG}" >/dev/null || true
