services:
  dakera:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.local
    ports:
      - "3000:3000"
      - "50051:50051"
    environment:
      - RUST_LOG=info
      - DAKERA_HOST=0.0.0.0
      - DAKERA_PORT=3000
      - DAKERA_GRPC_PORT=50051
      - DAKERA_STORAGE=memory
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Optional: MinIO for S3-compatible storage testing
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  minio-data:
