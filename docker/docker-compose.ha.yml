# =============================================================================
# Dakera - High Availability Cluster
# =============================================================================
# Full production-like stack: 3-node cluster with load balancer, shared storage,
# caching, monitoring, and dashboard.
#
# All services use published container images — no local builds required.
#
# IMPORTANT: This file sets `name: dakera-ha` to isolate it from the single-node
# stack (docker-compose.yml, project name: dakera). Without this, both stacks
# share the same Compose project name and Docker reconciliation removes each
# other's containers on `up` — causing the MinIO/network interference (DAK-829).
#
# Usage:
#   docker compose -f docker-compose.ha.yml up -d
#   docker compose -f docker-compose.ha.yml up -d --profile monitoring
#   docker compose -f docker-compose.ha.yml up -d --profile full
#   docker compose -f docker-compose.ha.yml down
#
# Endpoints (default HA_ port overrides — safe for single-server co-deployment):
#   Dakera API (LB):   http://localhost:3100   (HA_LB_HTTP_PORT)
#   Dakera gRPC (LB):  localhost:50151          (HA_LB_GRPC_PORT)
#   Dashboard:          http://localhost:3202   (HA_DASHBOARD_PORT)
#   Traefik Dashboard:  http://localhost:8080   (HA_TRAEFIK_PORT)
#   MinIO API:          http://localhost:9100   (HA_MINIO_API_PORT)
#   MinIO Console:      http://localhost:9101   (HA_MINIO_CONSOLE_PORT)
#   Redis:              localhost:6480          (HA_REDIS_PORT)
#   Prometheus:         http://localhost:9190   (--profile monitoring, HA_PROMETHEUS_PORT)
#   Grafana:            http://localhost:3203   (--profile monitoring, HA_GRAFANA_PORT)
#   Jaeger UI:          http://localhost:16787  (--profile monitoring, HA_JAEGER_UI_PORT)
#
# Override any port by setting the corresponding HA_* env var. See .env.ha.example.
# =============================================================================

name: dakera-ha

x-dakera-common: &dakera-common
  image: ${DAKERA_IMAGE:-ghcr.io/dakera-ai/dakera:0.8.6}
  restart: unless-stopped
  networks:
    - dakera-ha-net
  expose:
    - "3000"
    - "50051"
    - "7946"
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 15s

x-dakera-env: &dakera-env
  DAKERA_HOST: "0.0.0.0"
  DAKERA_PORT: "3000"
  DAKERA_GRPC_PORT: "50051"
  DAKERA_CLUSTER_MODE: "true"
  DAKERA_GOSSIP_PORT: "7946"
  # Storage — shared MinIO
  DAKERA_STORAGE: "s3"
  DAKERA_S3_ENDPOINT: "http://minio:9000"
  DAKERA_S3_BUCKET: "dakera"
  AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER:-minioadmin}"
  AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD:-minioadmin}"
  DAKERA_S3_REGION: "us-east-1"
  # Cache
  DAKERA_L1_CACHE_SIZE: "536870912"
  DAKERA_L2_CACHE_PATH: "/data/rocksdb"
  DAKERA_CACHE_REDIS_URL: "redis://redis:6379"
  # Tiered storage (L1 hot → L2 warm → L3 cold)
  DAKERA_TIERED_STORAGE: "true"
  DAKERA_HOT_TO_WARM_SECS: "3600"
  DAKERA_WARM_TO_COLD_SECS: "86400"
  DAKERA_AUTO_TIER: "true"
  DAKERA_TIER_CHECK_INTERVAL_SECS: "300"
  # Request limits
  DAKERA_MAX_BODY_SIZE: "524288000"
  # Auth
  DAKERA_AUTH_ENABLED: "${DAKERA_AUTH_ENABLED:-false}"
  DAKERA_ROOT_API_KEY: "${DAKERA_ROOT_API_KEY:-dk_dev_root_key_change_in_production}"
  # Logging
  RUST_LOG: "${RUST_LOG:-info,dakera=debug}"

services:
  # ==========================================================================
  # Traefik — Load Balancer
  # ==========================================================================
  traefik:
    image: traefik:latest
    container_name: dakera-lb
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.http.address=:3000"
      - "--entrypoints.grpc.address=:50051"
      - "--ping=true"
      - "--ping.entrypoint=http"
      - "--log.level=INFO"
      - "--accesslog=true"
    ports:
      - "${HA_LB_HTTP_PORT:-3100}:3000"
      - "${HA_LB_GRPC_PORT:-50151}:50051"
      - "${HA_TRAEFIK_PORT:-8080}:8080"
    volumes:
      - ./traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      dakera-ha-net:
        aliases:
          - dakera-traefik
    depends_on:
      minio:
        condition: service_healthy

  # ==========================================================================
  # Dakera Node 1 (Primary)
  # ==========================================================================
  dakera-1:
    <<: *dakera-common
    container_name: dakera-1
    hostname: dakera-1
    environment:
      <<: *dakera-env
      DAKERA_NODE_ID: "node-1"
      DAKERA_CLUSTER_ROLE: "primary"
      DAKERA_CLUSTER_SEEDS: "dakera-2:7946,dakera-3:7946"
      DAKERA_GOSSIP_BIND: "0.0.0.0:7946"
      DAKERA_API_ADVERTISE: "http://dakera-1:3000"
    volumes:
      - dakera-1-cache:/data/cache
      - dakera-1-rocksdb:/data/rocksdb
    depends_on:
      minio-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  # ==========================================================================
  # Dakera Node 2 (Replica)
  # ==========================================================================
  dakera-2:
    <<: *dakera-common
    container_name: dakera-2
    hostname: dakera-2
    environment:
      <<: *dakera-env
      DAKERA_NODE_ID: "node-2"
      DAKERA_CLUSTER_ROLE: "replica"
      DAKERA_CLUSTER_SEEDS: "dakera-1:7946,dakera-3:7946"
      DAKERA_GOSSIP_BIND: "0.0.0.0:7946"
      DAKERA_API_ADVERTISE: "http://dakera-2:3000"
    volumes:
      - dakera-2-cache:/data/cache
      - dakera-2-rocksdb:/data/rocksdb
    depends_on:
      minio-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      dakera-1:
        condition: service_healthy

  # ==========================================================================
  # Dakera Node 3 (Replica)
  # ==========================================================================
  dakera-3:
    <<: *dakera-common
    container_name: dakera-3
    hostname: dakera-3
    environment:
      <<: *dakera-env
      DAKERA_NODE_ID: "node-3"
      DAKERA_CLUSTER_ROLE: "replica"
      DAKERA_CLUSTER_SEEDS: "dakera-1:7946,dakera-2:7946"
      DAKERA_GOSSIP_BIND: "0.0.0.0:7946"
      DAKERA_API_ADVERTISE: "http://dakera-3:3000"
    volumes:
      - dakera-3-cache:/data/cache
      - dakera-3-rocksdb:/data/rocksdb
    depends_on:
      minio-setup:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      dakera-1:
        condition: service_healthy

  # ==========================================================================
  # Redis — Distributed Cache
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: dakera-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${HA_REDIS_PORT:-6480}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - dakera-ha-net

  # ==========================================================================
  # MinIO — Shared S3-Compatible Object Storage
  # ==========================================================================
  minio:
    image: minio/minio:latest
    container_name: dakera-ha-minio
    command: server /data --console-address ":9001"
    ports:
      - "${HA_MINIO_API_PORT:-9100}:9000"
      - "${HA_MINIO_CONSOLE_PORT:-9101}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - dakera-ha-net

  # ==========================================================================
  # MinIO Setup — Create bucket on startup
  # ==========================================================================
  minio-setup:
    image: minio/mc:latest
    container_name: dakera-ha-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/dakera --ignore-existing;
      mc anonymous set download myminio/dakera;
      echo 'Dakera bucket ready';
      exit 0;
      "
    networks:
      - dakera-ha-net

  # ==========================================================================
  # Dakera Dashboard — Web UI
  # ==========================================================================
  dashboard:
    image: ${DASHBOARD_IMAGE:-ghcr.io/dakera-ai/dakera-dashboard:0.3.28}
    container_name: dakera-dashboard
    ports:
      - "${HA_DASHBOARD_PORT:-3202}:3000"
    environment:
      - DAKERA_API_UPSTREAM=http://dakera-traefik:3000
      - DAKERA_API_KEY=${DAKERA_ROOT_API_KEY:-dk_dev_root_key_change_in_production}
    depends_on:
      dakera-1:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dakera-ha-net

  # ==========================================================================
  # Prometheus — Metrics Collection (optional)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: dakera-prometheus
    profiles: ["monitoring", "full"]
    ports:
      - "${HA_PROMETHEUS_PORT:-9190}:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - dakera-ha-net

  # ==========================================================================
  # Grafana — Dashboards & Visualization (optional)
  # ==========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: dakera-grafana
    profiles: ["monitoring", "full"]
    ports:
      - "${HA_GRAFANA_PORT:-3203}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-dakera}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - dakera-ha-net

  # ==========================================================================
  # Jaeger — Distributed Tracing (optional)
  # ==========================================================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: dakera-jaeger
    profiles: ["monitoring", "full"]
    ports:
      - "${HA_JAEGER_UI_PORT:-16787}:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped
    networks:
      - dakera-ha-net

volumes:
  dakera-1-cache:
  dakera-1-rocksdb:
  dakera-2-cache:
  dakera-2-rocksdb:
  dakera-3-cache:
  dakera-3-rocksdb:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  dakera-ha-net:
    driver: bridge
