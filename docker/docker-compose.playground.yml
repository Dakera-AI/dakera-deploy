# =============================================================================
# Dakera Playground — Resource-Limited Single-Node Stack (DAK-6706)
# =============================================================================
# Playground limits vs production:
#   Dakera:  5 GB RAM / 3 vCPU (vs 8 GB / 4 vCPU)
#   MinIO:   1.5 GB RAM / 1 vCPU (vs 4 GB / 2 vCPU)
#   Body:    5 MB max (vs 500 MB)
#   Timeout: 30 s (vs 600 s)
#   Rate:    Nginx enforces 10 req/min per IP (AC8), sandbox proxy enforces 10 req/min per session
#
# Deploy: docker compose -f docker-compose.playground.yml up -d
# =============================================================================

name: dakera-playground

services:
  # ==========================================================================
  # Dakera — AI Agent Memory Platform (playground limits)
  # ==========================================================================
  dakera:
    image: ${DAKERA_IMAGE:-ghcr.io/dakera-ai/dakera:latest}
    container_name: playground-dakera
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - RUST_LOG=${RUST_LOG:-warn}
      - DAKERA_HOST=0.0.0.0
      - DAKERA_PORT=3000
      - DAKERA_STORAGE=s3
      - DAKERA_S3_ENDPOINT=http://minio:9000
      - DAKERA_S3_BUCKET=${MINIO_BUCKET:-dakera-playground}
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      - DAKERA_S3_REGION=us-east-1
      - DAKERA_AUTH_ENABLED=true
      - DAKERA_ROOT_API_KEY=${DAKERA_ROOT_API_KEY:?Set DAKERA_ROOT_API_KEY in .env}
      # Playground resource limits
      - DAKERA_L1_CACHE_SIZE=134217728
      - DAKERA_L2_CACHE_PATH=/data/rocksdb
      - DAKERA_MAX_BODY_SIZE=5242880
      - DAKERA_REQUEST_TIMEOUT=30
      # Keep tiered OFF — playground doesn't need tiered hot/warm/cold
      - DAKERA_TIERED=0
      - DAKERA_SEARCH_MODE=hybrid
      # Token passthrough for HF model downloads (optional)
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - dakera-cache:/data/cache
      - dakera-rocksdb:/data/rocksdb
    deploy:
      resources:
        limits:
          memory: 5120M
          cpus: "3.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    networks:
      - playground-net
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ==========================================================================
  # MinIO — S3-Compatible Storage (playground limits)
  # ==========================================================================
  minio:
    image: minio/minio:latest
    container_name: playground-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      - MINIO_API_REQUESTS_MAX=200
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - playground-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ==========================================================================
  # MinIO Setup — Create bucket on first boot
  # ==========================================================================
  minio-setup:
    image: minio/mc:latest
    container_name: playground-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      set -e;
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb myminio/$${MINIO_BUCKET:-dakera-playground} --ignore-existing;
      mc ls myminio/$${MINIO_BUCKET:-dakera-playground} > /dev/null;
      echo 'Playground bucket verified and ready';
      "
    networks:
      - playground-net

  # ==========================================================================
  # Sandbox Proxy — per-session limits for the public playground (DAK-6713)
  # Sits between Nginx and the engine, enforcing rate/cap/TTL/allow-list/CORS
  # that the per-IP Nginx rules cannot express. Injects the root API key so
  # clients never hold it. Pure Node.js stdlib, zero dependencies.
  # ==========================================================================
  sandbox-proxy:
    build:
      context: ./playground/proxy
    image: dakera-playground-sandbox-proxy:latest
    container_name: playground-sandbox-proxy
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      - PROXY_PORT=3100
      - DAKERA_UPSTREAM_URL=http://dakera:3000
      - DAKERA_ROOT_API_KEY=${DAKERA_ROOT_API_KEY:?Set DAKERA_ROOT_API_KEY in .env}
      - SANDBOX_RATE_LIMIT_PER_MIN=${SANDBOX_RATE_LIMIT_PER_MIN:-30}
      - SANDBOX_MEMORY_CAP=${SANDBOX_MEMORY_CAP:-50}
      - SANDBOX_SESSION_TTL_SEC=${SANDBOX_SESSION_TTL_SEC:-1800}
      - SANDBOX_MAX_SESSIONS_PER_IP=${SANDBOX_MAX_SESSIONS_PER_IP:-20}
      - SANDBOX_MAX_BODY_BYTES=${SANDBOX_MAX_BODY_BYTES:-262144}
      - SANDBOX_ALLOWED_ORIGINS=${SANDBOX_ALLOWED_ORIGINS:-https://dakera.ai,https://www.dakera.ai,https://playground.dakera.ai}
      # LLM side-by-side comparison (DAK-6845): OpenRouter free-model API key.
      # Required for POST /v1/playground/llm-compare to function.
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - SANDBOX_LLM_RATE_LIMIT=${SANDBOX_LLM_RATE_LIMIT:-5}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M
          cpus: "0.1"
    depends_on:
      dakera:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3100/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - playground-net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  dakera-cache:
  dakera-rocksdb:
  minio-data:

networks:
  playground-net:
    driver: bridge
