# =============================================================================
# Dakera - Single Node Quick Start
# =============================================================================
# Minimal setup: one Dakera node + MinIO storage.
# For HA cluster, use docker-compose.ha.yml instead.
#
# Usage:
#   docker compose up -d
#   docker compose up -d --profile dashboard   # with Dashboard UI
#   docker compose down
# =============================================================================

name: dakera

services:
  # ==========================================================================
  # Dakera - AI Agent Memory Platform
  # ==========================================================================
  dakera:
    image: ${DAKERA_IMAGE:-ghcr.io/dakera-ai/dakera:0.11.81}
    container_name: dakera
    ports:
      - "${DAKERA_PORT:-3000}:3000"
      - "${DAKERA_GRPC_PORT:-50051}:50051"
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - DAKERA_HOST=0.0.0.0
      - DAKERA_PORT=3000
      - DAKERA_GRPC_PORT=50051
      - DAKERA_STORAGE=s3
      - DAKERA_S3_ENDPOINT=http://minio:9000
      - DAKERA_S3_BUCKET=dakera
      - AWS_ACCESS_KEY_ID=${MINIO_ROOT_USER:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - DAKERA_S3_REGION=us-east-1
      - DAKERA_L1_CACHE_SIZE=536870912
      - DAKERA_L2_CACHE_PATH=/data/rocksdb
      # Tiered storage (L1 hot → L2 warm → L3 cold via S3)
      - DAKERA_TIERED_STORAGE=true
      - DAKERA_HOT_TO_WARM_SECS=3600
      - DAKERA_WARM_TO_COLD_SECS=86400
      - DAKERA_AUTO_TIER=true
      - DAKERA_TIER_CHECK_INTERVAL_SECS=300
      # DAK-6203: DAKERA_TIERED OFF — Model2Vec StaticBackend needs a local
      # DAKERA_MODEL2VEC_PATH matrix (no remote model2vec repo exists).
      - DAKERA_TIERED=0
      - DAKERA_SEARCH_MODE=hybrid
      - DAKERA_MAX_BODY_SIZE=524288000
      - DAKERA_REQUEST_TIMEOUT=${DAKERA_REQUEST_TIMEOUT:-600}
      - DAKERA_AUTH_ENABLED=${DAKERA_AUTH_ENABLED:-true}
      - DAKERA_ROOT_API_KEY=${DAKERA_ROOT_API_KEY:?Set DAKERA_ROOT_API_KEY in .env (see .env.example)}
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - dakera-cache:/data/cache
      - dakera-rocksdb:/data/rocksdb
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    depends_on:
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - dakera-net

  # ==========================================================================
  # MinIO - S3-Compatible Object Storage
  # ==========================================================================
  minio:
    image: minio/minio:latest
    container_name: dakera-minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
      - MINIO_API_REQUESTS_MAX=${MINIO_API_REQUESTS_MAX:-6000}
    volumes:
      - minio-data:/data
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - dakera-net

  # ==========================================================================
  # MinIO Setup - Create bucket on startup
  # ==========================================================================
  minio-setup:
    image: minio/mc:latest
    container_name: dakera-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb myminio/dakera --ignore-existing;
      echo 'Dakera bucket ready';
      exit 0;
      "
    networks:
      - dakera-net

  # ==========================================================================
  # Prometheus + Grafana (optional — monitoring profile)
  # ==========================================================================
  # Enable with:  docker compose --profile monitoring up -d
  # Prometheus:   http://localhost:9090
  # Grafana:      http://localhost:3003  (admin / dakera)
  prometheus:
    image: prom/prometheus:v3.2.0
    container_name: dakera-prometheus
    profiles: ["monitoring", "full"]
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - dakera-net

  grafana:
    image: grafana/grafana:11.4.0
    container_name: dakera-grafana
    profiles: ["monitoring", "full"]
    ports:
      - "${GRAFANA_PORT:-3003}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-dakera}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/json/dakera-overview.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - dakera-net

  # ==========================================================================
  # Dakera Dashboard (optional)
  # ==========================================================================
  dashboard:
    image: ${DASHBOARD_IMAGE:-ghcr.io/dakera-ai/dakera-dashboard:0.3.29}
    container_name: dakera-dashboard
    profiles: ["dashboard", "full"]
    ports:
      - "${DASHBOARD_PORT:-3002}:3000"
    environment:
      - DAKERA_API_UPSTREAM=http://dakera:3000
      - DAKERA_API_KEY=${DAKERA_ROOT_API_KEY:?Set DAKERA_ROOT_API_KEY in .env (see .env.example)}
    depends_on:
      dakera:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dakera-net

  # ==========================================================================
  # Dakera ODE — On-Demand Enhancement sidecar (optional)
  # ==========================================================================
  # Enable with:  docker compose --profile ode up -d
  # ODE endpoint: http://localhost:8080/ode/enhance
  # Webhook:      http://localhost:8080/internal/webhook/memory-stored
  #
  # Configure dakera to fire webhook events:
  #   DAKERA_ODE_WEBHOOK_URL=http://dakera-ode:8080/internal/webhook/memory-stored
  # ==========================================================================
  dakera-ode:
    image: ${ODE_IMAGE:-ghcr.io/dakera-ai/dakera-ode:0.2.0}
    container_name: dakera-ode
    profiles: ["ode", "full"]
    ports:
      - "${ODE_PORT:-8080}:8080"
    environment:
      - LOG_LEVEL=${ODE_LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - dakera-net

volumes:
  dakera-cache:
  dakera-rocksdb:
  minio-data:
  prometheus-data:
  grafana-data:

networks:
  dakera-net:
    driver: bridge
