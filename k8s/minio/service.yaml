apiVersion: v1
kind: Service
metadata:
  name: dakera-minio
  namespace: dakera
  labels:
    app.kubernetes.io/name: dakera-minio
    app.kubernetes.io/component: storage
spec:
  selector:
    app.kubernetes.io/name: dakera-minio
    app.kubernetes.io/component: storage
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
  # ClusterIP — do not expose MinIO externally
  type: ClusterIP
