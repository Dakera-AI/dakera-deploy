# =============================================================================
# Dakera - Kubernetes Secret (example — DO NOT commit with real values)
# =============================================================================
# Create from this template:
#   cp secret.example.yaml secret.yaml
#   # Edit secret.yaml with real base64-encoded values
#   kubectl apply -f secret.yaml
#
# Encode values:  echo -n 'my-value' | base64
# Or use:         kubectl create secret generic dakera-secrets \
#                   --from-literal=DAKERA_ROOT_API_KEY=$(openssl rand -hex 32) \
#                   --from-literal=MINIO_ROOT_USER=minioadmin \
#                   --from-literal=MINIO_ROOT_PASSWORD=$(openssl rand -hex 16) \
#                   --namespace dakera
#
# secret.yaml is gitignored — never commit real credentials.
apiVersion: v1
kind: Secret
metadata:
  name: dakera-secrets
  namespace: dakera
  labels:
    app.kubernetes.io/name: dakera
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # base64 encoded values — replace with real values
  DAKERA_ROOT_API_KEY: <base64-encoded-root-api-key>
  MINIO_ROOT_USER: bWluaW9hZG1pbg==       # minioadmin
  MINIO_ROOT_PASSWORD: bWluaW9hZG1pbg==   # minioadmin (change in production!)
  AWS_ACCESS_KEY_ID: bWluaW9hZG1pbg==
  AWS_SECRET_ACCESS_KEY: bWluaW9hZG1pbg==
