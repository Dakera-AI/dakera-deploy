apiVersion: v1
kind: Service
metadata:
  name: {{ include "dakera.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dakera.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.dakera.service.type }}
  selector:
    {{- include "dakera.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: {{ .Values.dakera.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.dakera.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
---
{{- if .Values.dashboard.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dakera.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dakera.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  selector:
    {{- include "dakera.dashboard.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: {{ .Values.dashboard.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
---
{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dakera.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dakera.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: {{ .Values.mcp.service.type }}
  selector:
    {{- include "dakera.mcp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  ports:
    - name: http
      port: {{ .Values.mcp.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
