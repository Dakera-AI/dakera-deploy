apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dakera.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dakera.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.dakera.replicaCount }}
  selector:
    matchLabels:
      {{- include "dakera.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        {{- include "dakera.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.dakera.config.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dakera
          image: "{{ .Values.dakera.image.repository }}:{{ .Values.dakera.image.tag }}"
          imagePullPolicy: {{ .Values.dakera.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.dakera.config.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.dakera.config.grpcPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "dakera.fullname" . }}-config
            - secretRef:
                name: {{ include "dakera.fullname" . }}-secrets
          volumeMounts:
            - name: rocksdb
              mountPath: {{ .Values.dakera.config.l2CachePath }}
            - name: cache
              mountPath: /data/cache
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.dakera.resources | nindent 12 }}
      volumes:
        - name: rocksdb
          {{- if .Values.dakera.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "dakera.fullname" . }}-rocksdb
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: cache
          emptyDir: {}
---
{{- if .Values.dakera.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "dakera.fullname" . }}-rocksdb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dakera.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.dakera.persistence.storageClass }}
  storageClassName: {{ .Values.dakera.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.dakera.persistence.size }}
{{- end }}
---
{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dakera.fullname" . }}-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dakera.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      {{- include "dakera.dashboard.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "dakera.dashboard.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: DAKERA_API_UPSTREAM
              value: "http://{{ include "dakera.fullname" . }}:{{ .Values.dakera.config.port }}"
            - name: DAKERA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "dakera.fullname" . }}-secrets
                  key: DAKERA_ROOT_API_KEY
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
{{- end }}
---
{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dakera.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dakera.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  replicas: {{ .Values.mcp.replicaCount }}
  selector:
    matchLabels:
      {{- include "dakera.mcp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: mcp
  template:
    metadata:
      labels:
        {{- include "dakera.mcp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: mcp
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: dakera-mcp
          image: "{{ .Values.mcp.image.repository }}:{{ .Values.mcp.image.tag }}"
          imagePullPolicy: {{ .Values.mcp.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcp.config.port }}
          env:
            - name: DAKERA_URL
              value: "http://{{ include "dakera.fullname" . }}:{{ .Values.dakera.config.port }}"
            - name: DAKERA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "dakera.fullname" . }}-secrets
                  key: DAKERA_ROOT_API_KEY
            - name: MCP_PORT
              value: {{ .Values.mcp.config.port | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.mcp.resources | nindent 12 }}
{{- end }}
