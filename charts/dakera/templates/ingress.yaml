{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "dakera.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dakera.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.ingress.apiHost }}
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dakera.fullname" . }}
                port:
                  name: http
    {{- end }}
    {{- if and .Values.dashboard.enabled .Values.ingress.dashboardHost }}
    - host: {{ .Values.ingress.dashboardHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dakera.fullname" . }}-dashboard
                port:
                  name: http
    {{- end }}
    {{- if and .Values.mcp.enabled .Values.ingress.mcpHost }}
    - host: {{ .Values.ingress.mcpHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "dakera.fullname" . }}-mcp
                port:
                  name: http
    {{- end }}
{{- end }}
