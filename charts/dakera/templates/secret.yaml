{{- if .Values.dakera.rootApiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dakera.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dakera.labels" . | nindent 4 }}
type: Opaque
stringData:
  DAKERA_ROOT_API_KEY: {{ .Values.dakera.rootApiKey | quote }}
  {{- if .Values.minio.enabled }}
  MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ required "minio.rootPassword is required when minio.enabled=true" .Values.minio.rootPassword | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.minio.rootUser | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.minio.rootPassword | quote }}
  {{- end }}
{{- else }}
# No rootApiKey set — create a secret manually:
#   kubectl create secret generic {{ include "dakera.fullname" . }}-secrets \
#     --from-literal=DAKERA_ROOT_API_KEY=$(openssl rand -hex 32) \
#     --from-literal=MINIO_ROOT_USER=minioadmin \
#     --from-literal=MINIO_ROOT_PASSWORD=$(openssl rand -hex 16) \
#     --from-literal=AWS_ACCESS_KEY_ID=minioadmin \
#     --from-literal=AWS_SECRET_ACCESS_KEY=<minio-password> \
#     --namespace {{ .Release.Namespace }}
{{- end }}
